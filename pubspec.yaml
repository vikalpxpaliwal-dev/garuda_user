name: garuda_user_app
description: A production-ready Flutter scaffold for the Garuda Lands app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  equatable: ^2.0.7
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.0
  flutter_secure_storage: ^10.0.0
  flutter_svg: ^2.0.10+1
  get_it: ^8.0.3
  go_router: ^14.8.1
  image_picker: ^1.2.1
  json_annotation: ^4.9.0
  shared_preferences: ^2.5.5

dev_dependencies:
  build_runner: ^2.4.15
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  json_serializable: ^6.9.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
